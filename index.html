<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Your Everyday Journey 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow-x:hidden;}

  body{
    min-height:100vh;
    font-family:'Lora',serif;
    display:flex;align-items:center;justify-content:center;
    transition:background 1.2s ease;
  }

  #app{
    min-height:100vh;width:100%;
    display:flex;align-items:center;justify-content:center;
    padding:20px 16px 36px;
    position:relative;overflow:hidden;
    transition:background 1.2s ease;
  }

  /* ── Stars ── */
  .star{
    position:absolute;border-radius:50%;
    background:rgba(255,255,255,0.85);
    animation:twinkle 2s infinite alternate;
  }
  @keyframes twinkle{0%{opacity:.2;transform:scale(1);}100%{opacity:.9;transform:scale(1.4);}}

  /* ── Floating hearts ── */
  .heart-float{
    position:absolute;
    font-size:1.5rem;
    animation:floatUp 4.5s ease-in infinite;
    opacity:0.9;
    pointer-events:none;
    z-index:1;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(-5deg) scale(0.8);opacity:.9;}
    50%{transform:translateY(-50vh) rotate(8deg) scale(1.1);opacity:.6;}
    100%{transform:translateY(-110vh) rotate(20deg) scale(0.7);opacity:0;}
  }

  /* ── Card ── */
  #card{
    width:100%;max-width:520px;
    transition:opacity 0.45s ease,transform 0.45s ease;
    position:relative;z-index:2;
  }
  #card.hidden{opacity:0;transform:translateY(18px);}

  /* ── Progress dots ── */
  #dots{display:flex;gap:8px;justify-content:center;margin-bottom:24px;}
  .dot{
    height:8px;border-radius:4px;
    background:rgba(255,255,255,0.28);
    transition:all 0.4s cubic-bezier(.4,0,.2,1);
  }
  .dot.active{background:rgba(255,255,255,0.95);width:22px!important;}
  .dot.done{background:rgba(255,255,255,0.65);}

  /* ── Scene box ── */
  #scene-box{
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:28px;
    padding:34px 30px 28px;
    border:1.5px solid rgba(255,255,255,0.32);
    box-shadow:0 16px 56px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.08);
    animation:fadeUp 0.55s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

  #scene-emoji{
    text-align:center;font-size:3.6rem;
    margin-bottom:14px;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    animation:emojiPop 0.5s cubic-bezier(.4,0,.2,1) 0.1s both;
  }
  @keyframes emojiPop{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}

  #scene-title{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.15rem,4.5vw,1.5rem);
    color:#fff;text-align:center;
    margin-bottom:18px;
    text-shadow:0 2px 10px rgba(0,0,0,0.2);
    line-height:1.35;
    letter-spacing:0.01em;
  }

  #scene-text-box{
    background:rgba(255,255,255,0.11);
    border-radius:18px;padding:20px 18px;
    margin-bottom:22px;
    border:1px solid rgba(255,255,255,0.2);
  }
  #scene-text{
    font-family:'Lora',serif;
    font-size:clamp(0.9rem,2.5vw,1rem);
    color:rgba(255,255,255,0.96);
    line-height:2;
    white-space:pre-line;
    text-shadow:0 1px 4px rgba(0,0,0,0.12);
  }

  #choices{display:flex;flex-direction:column;gap:11px;}
  .choice-btn{
    background:rgba(255,255,255,0.18);
    border:1.5px solid rgba(255,255,255,0.42);
    border-radius:50px;
    padding:14px 22px;
    color:#fff;
    font-family:'Lora',serif;
    font-size:clamp(0.87rem,2.3vw,0.97rem);
    cursor:pointer;
    transition:all 0.22s cubic-bezier(.4,0,.2,1);
    text-shadow:0 1px 3px rgba(0,0,0,0.12);
    text-align:center;
    line-height:1.4;
    letter-spacing:0.01em;
  }
  .choice-btn:hover,.choice-btn:active{
    background:rgba(255,255,255,0.36);
    border-color:rgba(255,255,255,0.7);
    transform:translateY(-2px) scale(1.015);
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
  }

  /* ── Final scene ── */
  #final-box{
    display:flex;flex-direction:column;align-items:center;
    text-align:center;padding:16px 12px 0;
    animation:fadeUp 0.8s cubic-bezier(.4,0,.2,1) both;
    width:100%;max-width:520px;
  }
  #final-emoji{
    font-size:4.2rem;margin-bottom:14px;
    animation:pulse 2s ease-in-out infinite;
    filter:drop-shadow(0 4px 14px rgba(255,100,100,0.3));
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

  #final-title{
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:clamp(1.5rem,5.5vw,2.2rem);
    color:#fff;margin-bottom:20px;
    text-shadow:0 2px 14px rgba(0,0,0,0.22);
    line-height:1.25;
  }
  #final-letter{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-radius:24px;padding:28px 26px;
    max-width:480px;width:100%;
    border:1.5px solid rgba(255,255,255,0.38);
    box-shadow:0 10px 48px rgba(0,0,0,0.15);
    margin-bottom:22px;
    text-align:left;
  }
  #final-letter p{
    font-family:'Lora',serif;
    font-size:clamp(0.92rem,2.5vw,1.05rem);
    color:#fff;line-height:2;
    text-shadow:0 1px 4px rgba(0,0,0,0.12);
    margin-bottom:0;
  }
  #final-sign{
    font-family:'Playfair Display',serif;font-style:italic;
    color:#FFE4E1;font-size:1.12rem;
    margin-top:18px;
    display:block;
    text-align:right;
    text-shadow:0 1px 6px rgba(0,0,0,0.15);
  }
  #restart-btn{
    background:rgba(255,255,255,0.2);
    border:1.5px solid rgba(255,255,255,0.52);
    border-radius:50px;padding:12px 30px;
    color:#fff;font-family:'Lora',serif;
    font-size:0.92rem;cursor:pointer;
    transition:all 0.22s ease;
    letter-spacing:0.02em;
  }
  #restart-btn:hover{
    background:rgba(255,255,255,0.35);
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
  }

  /* ── Share strip ── */
  #share-strip{
    margin-top:16px;
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  }
  .share-btn{
    border-radius:50px;padding:10px 18px;
    font-family:'Lora',serif;font-size:0.85rem;
    cursor:pointer;border:none;
    transition:all 0.2s ease;
    display:flex;align-items:center;gap:6px;
    font-weight:500;
  }
  .share-wa{background:#25D366;color:#fff;}
  .share-wa:hover{background:#1ebe5d;transform:translateY(-2px);}
  .share-copy{background:rgba(255,255,255,0.22);color:#fff;border:1.5px solid rgba(255,255,255,0.4);}
  .share-copy:hover{background:rgba(255,255,255,0.35);transform:translateY(-2px);}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:rgba(255,255,255,0.08);}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.38);border-radius:3px;}

  @media(max-width:400px){
    #scene-box{padding:26px 18px 22px;}
    #final-letter{padding:22px 18px;}
  }
</style>
</head>
<body>

<div id="app">
  <div id="card">
    <div id="dots"></div>
    <div id="scene-box">
      <div id="scene-emoji"></div>
      <h2 id="scene-title"></h2>
      <div id="scene-text-box"><p id="scene-text"></p></div>
      <div id="choices"></div>
    </div>
  </div>
</div>

<script>
// ─── Scenes ────────────────────────────────────────────────────────────────
const scenes = {

  intro:{
    bg:"dawn",emoji:"🚇",
    title:"Your Everyday Journey...",
    text:"It's another regular day.\n\nYou're heading to Aarey JVLR Metro Station — headphones in, minding your business, just like always.\n\nBut today, the universe has a little something planned for you.\n\nAre you ready?",
    choices:[
      {l:"🎒 Let's go",n:"metro"},
      {l:"😒 I just want to get to work",n:"metro"}
    ]
  },

  metro:{
    bg:"metro",emoji:"🚉",
    title:"Aarey JVLR Metro Station",
    text:"You board the metro and find a seat.\n\nThen — out of nowhere — some guy sitting nearby starts talking.\n\n\"Yaar... protein chocolate oats. I miss them so much. Like genuinely, nothing hits the same. The texture, the taste... whoever makes those — absolute genius.\"\n\nHe sighs deeply, staring into the distance like he's lost something precious.\n\nYou slowly look up.",
    choices:[
      {l:"😏 \"Teedhe Medhe khae h kabhi? Bohot tasty hote h\" — He can wait",n:"metro_ignore"},
      {l:"💬 Talk to him",n:"siddhivinayak"}
    ]
  },

  metro_ignore:{
    bg:"metro",emoji:"🚇",
    title:"You Said Nothing...",
    text:"You kept your headphones in. Very mature. Very unbothered.\n\nBut secretly... you smiled.\n\nBecause you knew exactly who he was talking about.\n\nThe metro pulls into the next station. The journey continues.",
    choices:[
      {l:"🚉 Get off at Siddhivinayak",n:"siddhivinayak"}
    ]
  },

  siddhivinayak:{
    bg:"city",emoji:"🏙️",
    title:"Siddhivinayak Metro Station",
    text:"You get off at Siddhivinayak and start walking towards the office.\n\nHe's still somehow around — and he falls into step beside you.\n\n\"Bhai, aaj ka din kitna hectic hoga pata h... back to back calls, deadlines, sab kuch.\"\n\nHe pauses.\n\n\"But honestly? The only thing I keep thinking about is going home with you. That's it. That's the whole thought.\"",
    choices:[
      {l:"💬 Talk to him",n:"stairs"},
      {l:"🥪 Go to office and eat vadapav first",n:"vadapav"}
    ]
  },

  vadapav:{
    bg:"city",emoji:"🥪",
    title:"The Vadapav Was Good Though",
    text:"Okay look — the vadapav was absolutely worth it. Crispy. Perfect chutney. No notes.\n\nBut even as you ate it, you thought about what he said.\n\n\"...going home with you.\"\n\nYou took the last bite. Then headed upstairs.",
    choices:[
      {l:"🪜 Head to the 6th floor",n:"stairs"}
    ]
  },

  stairs:{
    bg:"office",emoji:"🪜",
    title:"The 6th Floor Stairs",
    text:"You find him sitting on the 6th floor stairs — the quiet spot.\n\nHe looks up and smiles. That smile.\n\nThen the compliments start. One after another. Genuine, warm, completely unashamed.\n\nAnd slowly, quietly... you feel the blush creeping in.\n\nYou had forgotten how much you missed that feeling.",
    choices:[
      {l:"🥺 Talk to him",n:"cat"},
      {l:"🏠 Go home, stay composed",n:"stairs_ignore"}
    ]
  },

  stairs_ignore:{
    bg:"office",emoji:"😶",
    title:"You Walked Away...",
    text:"You walked away. Composed. Unbothered. Completely fine.\n\n...\n\nYou thought about that smile the entire way down.\n\nOn the metro ride home, the universe decided to intervene.",
    choices:[
      {l:"🐱 Something is waiting at the next stop...",n:"cat"}
    ]
  },

  cat:{
    bg:"metro",emoji:"🐱",
    title:"A Cat Named Harleen",
    text:"On your way back home, you spot a tiny cat sitting near the metro door.\n\nShe blinks at you slowly. Her name tag reads: Harleen. 🐱\n\nShe opens her mouth and, in a very small and very serious voice, says:\n\n\"He loves you. Like, a lot. He messed up a little — he knows that. But the way he talks about you... it's embarrassing how much he means it.\"\n\nShe headbutts your ankle.\n\n\"Also he got chips. Your favourite ones. He's been holding them for a while now.\"\n\nHe holds out the packet. Quietly.",
    choices:[
      {l:"🍟 Take the chips. Talk to him.",n:"jvlr"},
      {l:"🚉 Ignore. Get off at Aarey JVLR.",n:"jvlr"}
    ]
  },

  jvlr:{
    bg:"dawn",emoji:"🌆",
    title:"Back at Aarey JVLR — Where It All Began",
    text:"You're back where the day started. Aarey JVLR Metro Station.\n\nThe same platform. The same evening light.\n\nAnd him — standing there, not saying anything dramatic, not making a scene. Just... there.\n\nBecause he knows that this place means something. That you mean everything.\n\nHe messed up. He knows it. And he's sorry — not just in words, but in every small thing he's been doing since.\n\nWhat do you do?",
    choices:[
      {l:"💬 Talk to him",n:"final"},
      {l:"🚶 Ignore him forever",n:"ignore_end"},
      {l:"🌱 Talk slowly... and get better with time",n:"final"}
    ]
  },

  ignore_end:{
    bg:"dawn",emoji:"😔",
    title:"...",
    text:"You walked past.\n\nHe didn't stop you. He just watched you go.\n\nThe platform got quiet.\n\nHarleen the cat appeared from nowhere and sat beside him.\n\nThey both stared at the metro tracks in silence.\n\n\"She'll come back,\" Harleen said.\n\nHe nodded. \"I know. I'll wait.\"\n\n...\n\nMaybe give him one more chance?",
    choices:[
      {l:"🔙 Go back to him",n:"jvlr"}
    ]
  },

  final:{bg:"final",emoji:"💌",isFinal:true}
};

// ─── Backgrounds ──────────────────────────────────────────────────────────
const BG = {
  dawn:   "linear-gradient(145deg,#FFD4A3 0%,#FFAB76 50%,#FF8C5A 100%)",
  metro:  "linear-gradient(145deg,#2C5282 0%,#4A90D9 50%,#1A3A5C 100%)",
  city:   "linear-gradient(145deg,#F7971E 0%,#FFD200 60%,#F9A825 100%)",
  office: "linear-gradient(145deg,#0ED2F7 0%,#B2FEFA 50%,#81D8F7 100%)",
  final:  "linear-gradient(145deg,#FFDDE1 0%,#FCB69F 50%,#FF9A9E 100%)"
};

// ─── State ────────────────────────────────────────────────────────────────
let currentId = "intro";
let stepCount  = 0;

const nonFinalScenes = Object.keys(scenes).filter(k => !scenes[k].isFinal);
const totalSteps = nonFinalScenes.length;

// ─── Stars ────────────────────────────────────────────────────────────────
function buildStars(){
  const app = document.getElementById("app");
  for(let i=0;i<32;i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*3+1;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    app.appendChild(s);
  }
}

// ─── Floating hearts ──────────────────────────────────────────────────────
let heartEls = [];
function showHearts(){
  const emojis = ["💕","💖","✨","🌸","💫","🌷","💝","🥺","💗"];
  heartEls.forEach(e=>e.remove());
  heartEls = [];
  const app = document.getElementById("app");
  emojis.forEach((h,i)=>{
    const d = document.createElement("div");
    d.className = "heart-float";
    d.textContent = h;
    d.style.cssText = `
      left:${8+i*11}%;
      bottom:-50px;
      animation-delay:${i*0.55}s;
      animation-duration:${3.8+Math.random()*1.5}s;
      font-size:${1.2+Math.random()*0.8}rem;
    `;
    app.appendChild(d);
    heartEls.push(d);
  });
}
function hideHearts(){heartEls.forEach(e=>e.remove());heartEls=[];}

// ─── Dots ─────────────────────────────────────────────────────────────────
function renderDots(){
  const dotsEl = document.getElementById("dots");
  dotsEl.innerHTML = "";
  const cur = Math.min(stepCount, totalSteps-1);
  for(let i=0;i<totalSteps;i++){
    const d = document.createElement("div");
    d.className = "dot";
    d.style.width = i===cur ? "22px" : "8px";
    if(i < cur) d.classList.add("done");
    else if(i === cur) d.classList.add("active");
    dotsEl.appendChild(d);
  }
}

// ─── Share helpers ─────────────────────────────────────────────────────────
function getShareURL(){
  return window.location.href;
}
function shareWhatsApp(){
  const url = encodeURIComponent(getShareURL());
  const text = encodeURIComponent("🚇💌 Play this little love story — it starts at a metro station and ends somewhere special...\n\n");
  window.open(`https://wa.me/?text=${text}${url}`,"_blank");
}
function copyLink(){
  navigator.clipboard.writeText(getShareURL()).then(()=>{
    const btn = document.getElementById("copy-btn");
    if(btn){ btn.textContent="✅ Copied!"; setTimeout(()=>{ btn.textContent="🔗 Copy Link"; },2000); }
  }).catch(()=>{
    // fallback
    const ta = document.createElement("textarea");
    ta.value = getShareURL();
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });
}

// ─── Render ───────────────────────────────────────────────────────────────
function renderScene(id){
  const scene = scenes[id];
  const app   = document.getElementById("app");
  const card  = document.getElementById("card");

  // background
  app.style.background = BG[scene.bg] || BG.dawn;

  if(scene.isFinal){
    document.getElementById("dots").style.display = "none";
    document.getElementById("scene-box").style.display = "none";

    const old = document.getElementById("final-box");
    if(old) old.remove();

    const box = document.createElement("div");
    box.id = "final-box";
    box.innerHTML = `
      <div id="final-emoji">💌</div>
      <h2 id="final-title">You made it. 🥺</h2>
      <div id="final-letter">
        <p>Hi. It's me. The guy who won't stop talking about your protein chocolate oats. 👋<br><br>
        I know I messed up. And I know that sorry alone doesn't fix things — but I mean it with my whole entire heart.<br><br>
        I miss you. I miss walking with you from Siddhivinayak. I miss sitting on the 6th floor stairs and watching you smile. I miss the metro rides home. I miss making you blush.<br><br>
        Harleen misses you too. She told me herself.<br><br>
        You are my favourite person, my best friend, and the one who makes everything feel like home. Even a hectic day feels okay when it ends with you.<br><br>
        I made you a whole adventure just to say: <strong style="color:#FFE4E1;font-style:italic;">please talk to me again.</strong><br><br>
        I'll be right here. Waiting at Aarey JVLR. Holding your chips. 🍟</p>
        <span id="final-sign">— Yours, always 💕</span>
      </div>
      <button id="restart-btn">🔄 Play again from the start</button>
      <div id="share-strip">
        <button class="share-btn share-wa" onclick="shareWhatsApp()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/></svg>
          Share on WhatsApp
        </button>
        <button id="copy-btn" class="share-btn share-copy" onclick="copyLink()">🔗 Copy Link</button>
      </div>
    `;
    card.appendChild(box);
    document.getElementById("restart-btn").onclick = ()=>goTo("intro");
    showHearts();
    return;
  }

  // normal scene
  hideHearts();
  document.getElementById("dots").style.display = "flex";
  document.getElementById("scene-box").style.display = "block";
  const old = document.getElementById("final-box");
  if(old) old.remove();

  document.getElementById("scene-emoji").textContent = scene.emoji;
  document.getElementById("scene-title").textContent  = scene.title;
  document.getElementById("scene-text").textContent   = scene.text;

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  scene.choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = c.l;
    btn.onclick = ()=>goTo(c.n);
    choicesEl.appendChild(btn);
  });

  // re-trigger animation
  const sb = document.getElementById("scene-box");
  sb.style.animation = "none";
  void sb.offsetHeight;
  sb.style.animation = "fadeUp 0.55s cubic-bezier(.4,0,.2,1) both";

  renderDots();
}

// ─── Navigate ─────────────────────────────────────────────────────────────
function goTo(id){
  const card = document.getElementById("card");
  card.classList.add("hidden");
  setTimeout(()=>{
    currentId = id;
    if(!scenes[id].isFinal) stepCount++;
    renderScene(id);
    card.classList.remove("hidden");
    window.scrollTo({top:0,behavior:"smooth"});
  },400);
}

// ─── Init ─────────────────────────────────────────────────────────────────
buildStars();
renderScene("intro");
</script>
</body>
</html>
